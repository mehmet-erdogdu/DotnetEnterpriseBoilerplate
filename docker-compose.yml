services:
  postgres:
    image: postgres:18-alpine3.22
    container_name: postgres
    environment:
      - POSTGRES_USER=blogapp
      - POSTGRES_PASSWORD=blogapp123
      - POSTGRES_DB=blogapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
  vault:
    image: hashicorp/vault:1.20.2
    container_name: vault
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=root
      - VAULT_ADDR=http://0.0.0.0:8200
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    # Start Vault in dev mode, then seed KV v2 secrets from mounted VAULT.json so they persist across restarts
    command: sh -c "vault server -dev -dev-root-token-id=root -dev-listen-address=0.0.0.0:8200 & \
      sleep 2 && \
      export VAULT_ADDR=http://127.0.0.1:8200 && \
      export VAULT_TOKEN=root && \
      (vault secrets enable -version=2 -path=secret kv || true) && \
      vault kv put secret/BLOG_APP @/vault/bootstrap/VAULT.json && \
      wait"
    volumes:
      - /Users/mehmet-erdogdu/Documents/Git/DotnetEnterpriseBoilerplate/src/BlogApp.API/VAULT.json:/vault/bootstrap/VAULT.json:ro
    networks:
      - app_network

  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - app_network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.1.1
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - app_network

  kibana:
    image: docker.elastic.co/kibana/kibana:9.1.3
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - app_network

  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - app_network

  redis:
    image: redis:8.2.0-alpine3.22
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass redis123
    networks:
      - app_network

  rabbitmq:
    image: rabbitmq:4.1.3-management
    container_name: rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
      - RABBITMQ_DEFAULT_VHOST=/
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - app_network

volumes:
  elasticsearch_data:
    driver: local
  sonarqube_data:
    driver: local
  sonarqube_extensions:
    driver: local
  sonarqube_logs:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  postgres_data:
    driver: local

networks:
  app_network:
    driver: bridge
