name: SonarQube
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build:
    name: Build and analyze
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Cache SonarQube Cloud packages
        uses: actions/cache@v4
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache SonarQube Cloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: .\.sonar\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner
      - name: Install SonarQube Cloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -Path .\.sonar\scanner -ItemType Directory
          dotnet tool update dotnet-sonarscanner --tool-path .\.sonar\scanner
      - name: Restore .NET dependencies
        run: dotnet restore
      - name: Build .NET project
        run: dotnet build --no-restore
      - name: Run .NET tests with coverage
        run: |
          dotnet test --collect:"XPlat Code Coverage" --settings tests/BlogApp.UnitTests/coverlet.runsettings --results-directory ./TestResults
        continue-on-error: true
      - name: SonarQube Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: |
          # Find the .NET coverage file
          $dotnetCoverageFile = Get-ChildItem -Path ./TestResults -Recurse -Name "coverage.opencover.xml" | Select-Object -First 1
          $dotnetCoveragePath = ""
          if ($dotnetCoverageFile) {
            $dotnetCoveragePath = "./TestResults/$dotnetCoverageFile"
            Write-Host "Dotnet coverage file found: $dotnetCoveragePath"
          } else {
            Write-Host "No dotnet coverage file found"
          }
          
          # Begin SonarScanner with coverage data
          if ($dotnetCoveragePath) {
            .\.sonar\scanner\dotnet-sonarscanner begin /k:"mehmet-erdogdu_ai-blogApp" /o:"mehmet-erdogdu" /d:sonar.token="${{ secrets.SONAR_TOKEN }}" /d:sonar.cs.opencover.reportsPaths="$dotnetCoveragePath"
          } else {
            Write-Host "No coverage files found"
            .\.sonar\scanner\dotnet-sonarscanner begin /k:"mehmet-erdogdu_ai-blogApp" /o:"mehmet-erdogdu" /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
          }
          
          # Build the project (already built during test phase)
          dotnet build --no-restore --verbosity quiet
          
          # End SonarScanner
          .\.sonar\scanner\dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"