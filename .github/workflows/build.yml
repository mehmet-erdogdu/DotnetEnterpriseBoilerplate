name: SonarQube Analysis

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube Analysis
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Install SonarQube Scanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restore dependencies
        run: dotnet restore

      - name: Run tests with coverage
        run: |
          dotnet test \
            --collect:"XPlat Code Coverage" \
            --settings tests/BlogApp.UnitTests/coverlet.runsettings \
            --results-directory ./TestResults \
            --verbosity normal
        continue-on-error: true
      - name: SonarQube Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          # Find coverage file
          $coverageFile = Get-ChildItem -Path ./TestResults -Recurse -Filter "coverage.opencover.xml" | Select-Object -First 1
          
          # Begin SonarQube analysis
          if ($coverageFile) {
            Write-Host "Coverage file found: $($coverageFile.FullName)"
            dotnet sonarscanner begin \
              /k:"mehmet-erdogdu_ai-blogApp" \
              /o:"mehmet-erdogdu" \
              /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
              /d:sonar.cs.opencover.reportsPaths="$($coverageFile.FullName)"
          } else {
            Write-Host "No coverage file found, running without coverage"
            dotnet sonarscanner begin \
              /k:"mehmet-erdogdu_ai-blogApp" \
              /o:"mehmet-erdogdu" \
              /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
          }
          
          # Build project
          dotnet build --no-restore --verbosity quiet
          
          # End SonarQube analysis
          dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"