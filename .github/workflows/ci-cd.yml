name: CI/CD Pipeline with Code Coverage

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  DOTNET_VERSION: '10.0.x'
  COVERAGE_THRESHOLD: 60

jobs:
  test-and-coverage:
    name: Test and Code Coverage
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Shallow clones should be disabled for better analysis

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build --configuration Release --no-restore

    - name: Run SonarQube analysis
      if: matrix.os == 'ubuntu-latest'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_ORG: ${{ secrets.SONAR_ORG }}
      run: |
        # TODO: Configure SONAR_ORG secret with your SonarCloud organization key
        dotnet sonarscanner begin \
          /k:"BlogApp" \
          /o:"${{ env.SONAR_ORG }}" \
          /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
          /d:sonar.host.url="https://sonarcloud.io" \
          /d:sonar.cs.opencover.reportsPaths="TestResults/*/coverage.opencover.xml" \
          /d:sonar.coverage.exclusions="**/Tests/**,**/Migrations/**,**/DTOs/**,**/Entities/**,**/Program.cs,**/GlobalUsings.cs,**/Constants/**"

    - name: Run tests with coverage
      run: |
        dotnet test \
          --configuration Release \
          --no-build \
          --no-restore \
          --collect:"XPlat Code Coverage" \
          --settings tests/BlogApp.UnitTests/coverlet.runsettings

    - name: End SonarQube analysis
      if: matrix.os == 'ubuntu-latest'
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

    - name: Extract coverage percentage
      id: coverage
      run: |
        # Extract line coverage percentage from cobertura XML
        COVERAGE=$(grep -o 'line-rate="[^"]*"' TestResults/*/coverage.cobertura.xml | head -1 | sed 's/line-rate="//;s/"//')
        COVERAGE_PERCENT=$(echo "$COVERAGE * 100" | bc | cut -d. -f1)
        echo "coverage=$COVERAGE_PERCENT" >> $GITHUB_OUTPUT
        echo "Coverage: $COVERAGE_PERCENT%"

    - name: Upload coverage reports to Codecov
      if: matrix.os == 'ubuntu-latest'
      uses: actions/codecov/codecov-action@v4
      with:
        file: ./TestResults/*/coverage.cobertura.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Archive coverage reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-reports-${{ matrix.os }}
        path: |
          CoverageReports/
          TestResults/
        retention-days: 30

    - name: Comment PR with coverage
      if: github.event_name == 'pull_request' && matrix.os == 'ubuntu-latest'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          
          try {
            // Try to read coverage from JSON summary
            const summaryPath = 'CoverageReports/HTML/Summary.json';
            if (fs.existsSync(summaryPath)) {
              const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
              const lineCoverage = summary.summary.linecoverage;
              
              const comment = `## 📊 Code Coverage Report
              
              **Line Coverage: ${lineCoverage}%**
              
              ${lineCoverage >= ${{ env.COVERAGE_THRESHOLD }} ? '✅' : '❌'} Coverage ${lineCoverage >= ${{ env.COVERAGE_THRESHOLD }} ? 'meets' : 'does not meet'} the threshold of ${{ env.COVERAGE_THRESHOLD }}%
              
              📁 [View detailed coverage report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
              `;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }
          } catch (error) {
            console.log('Could not generate coverage comment:', error);
          }

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Run security scan
      run: |
        dotnet tool install --global security-scan
        security-scan BlogApp.slnx

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [test-and-coverage]
    if: always()
    
    steps:
    - name: Check test results
      run: |
        if [ "${{ needs.test-and-coverage.result }}" != "success" ]; then
          echo "❌ Tests failed or coverage threshold not met"
          exit 1
        fi
        echo "✅ All quality gates passed"
